<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>[FILE CONVERTER]</title>

  <!-- Ícone da aba -->
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Cor da barra -->
  <meta name="theme-color" content="#0b1f3a">

  <!-- SEO -->
  <meta name="description" content="Conversor de arquivos moderno e rápido.">

  <style>

    /* RESET */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background-image:url(converter4.jpeg);

      background-repeat:no-repeat;
      background-position:center;
      background-size:cover;

      font-family:'Courier New', Courier, monospace;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;

      color:#ffffff;

      overflow:hidden;
    }

    /* CONTAINER */

    .container-principal{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:25px;
    }

    /* CARD */

    .card-conversor{

      background:
      rgba(255,255,255,0.03);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);

      border-radius:20px;

      padding:50px;

      width:750px;

      min-height:480px;

      box-shadow:
      0 25px 50px rgba(0,0,0,0.5);

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;

      transition:all 0.3s ease;
    }

    /* HEADER */

    .header-painel{
      display:flex;
      align-items:center;
      gap:15px;
      letter-spacing:1px;
    }

    /* NOVA LOGO */

    .logo-topo{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo-topo img{

      width:60px;
      height:60px;

      object-fit:contain;

      border-radius:14px;

      filter:
      drop-shadow(0 0 10px #00d9ff)
      drop-shadow(0 0 20px #00d9ff);

      animation: brilhoLogo 3s infinite alternate;
    }

    .titulo-logo{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
    }

    .titulo-logo button{

      background:none;
      border:none;

      font-family:inherit;

      font-size:22px;

      font-weight:bold;

      color:#ffffff;

      letter-spacing:2px;

      cursor:pointer;

      transition:0.3s;

      text-shadow:
      0 0 10px #00d9ff,
      0 0 20px #00d9ff;
    }

    .titulo-logo button:hover{
      color:#00d9ff;
    }

    .titulo-logo small{

      color:rgba(255,255,255,0.55);

      font-size:11px;

      letter-spacing:3px;

      margin-top:2px;
    }

    @keyframes brilhoLogo{

      from{
        transform:scale(1);
        opacity:0.9;
      }

      to{
        transform:scale(1.05);
        opacity:1;
      }

    }

    .header-painel span{
      color:rgba(255,255,255,0.3);
      font-size:24px;
    }

    .header-painel button{

      background:none;
      border:none;

      font-family:inherit;

      font-size:20px;

      color:rgba(255,255,255,0.6);

      cursor:pointer;

      transition:color 0.2s;

      outline:none;
    }

    .header-painel button:hover,
    .header-painel button.link-ativo{

      color:#ffffff;
      text-decoration:underline;
    }

    /* ZONA */

    .zona-acao{

      width:100%;

      display:flex;
      flex-direction:column;

      gap:25px;

      align-items:center;

      margin:40px 0;
    }

    /* SOBRE */

    .conteudo-sobre{

      width:100%;

      display:flex;

      gap:35px;

      align-items:center;

      margin:25px 0;

      text-align:left;
    }

    .foto-perfil{

      width:160px;
      height:160px;

      border-radius:50%;

      border:3px solid #4364F7;

      box-shadow:
      0 0 20px rgba(67,100,247,0.5);

      object-fit:cover;

      background-color:
      rgba(255,255,255,0.1);
    }

    .texto-sobre{

      flex:1;

      display:flex;
      flex-direction:column;

      gap:12px;
    }

    .texto-sobre h2{

      font-size:22px;

      color:#ffffff;

      border-bottom:
      1px solid rgba(255,255,255,0.2);

      padding-bottom:5px;

      margin-bottom:5px;
    }

    .texto-sobre p{

      font-size:14px;

      line-height:1.6;

      color:
      rgba(255,255,255,0.8);
    }

    /* REDES */

    .redes-sociais{
      display:flex;
      gap:20px;
      margin-top:10px;
      align-items:center;
    }

    .link-rede{

      color:
      rgba(255,255,255,0.5);

      transition:all 0.3s ease;

      display:inline-flex;

      align-items:center;

      text-decoration:none;
    }

    .link-rede svg{
      width:28px;
      height:28px;
      fill:currentColor;
    }

    .link-rede:hover{

      color:#ffffff;

      transform:translateY(-3px);

      filter:
      drop-shadow(0 0 8px #4364F7);
    }

    /* INPUT */

    .botao-upload{

      width:100%;

      border:
      2px dashed rgba(255,255,255,0.3);

      border-radius:10px;

      padding:26px;

      font-size:18px;

      text-align:center;

      cursor:pointer;

      display:flex;

      justify-content:center;
      align-items:center;

      gap:12px;

      color:
      rgba(255,255,255,0.8);

      transition:all 0.2s;
    }

    .botao-upload:hover{

      border-color:
      rgba(255,255,255,0.6);

      background:
      rgba(255,255,255,0.02);
    }

    .campo-selecao{
      width:100%;
    }

    .campo-selecao select{

      width:100%;

      background:
      rgba(255,255,255,0.05);

      border:
      1px solid rgba(255,255,255,0.2);

      border-radius:10px;

      padding:18px;

      font-size:18px;

      color:#ffffff;

      font-family:inherit;

      outline:none;

      cursor:pointer;

      text-align:center;
    }

    .campo-selecao select option{

      background:#1a1e24;
      color:#fff;
    }

    .escondido{
      display:none !important;
    }

    /* BOTÃO */

    .btn-principal{

      width:100%;

      background:
      rgba(255,255,255,0.05);

      color:
      rgba(255,255,255,0.3);

      border:
      1px solid rgba(255,255,255,0.1);

      border-radius:10px;

      padding:22px;

      font-size:22px;

      font-weight:bold;

      font-family:inherit;

      cursor:not-allowed;

      transition:all 0.3s ease;
    }

    .btn-principal.ativo{

      background:
      linear-gradient(
      135deg,
      #0052D4,
      #4364F7
      );

      color:white;

      border:none;

      cursor:pointer;

      box-shadow:
      0 0 25px rgba(67,100,247,0.4);
    }

    .btn-principal.ativo:hover{

      transform:translateY(-2px);

      box-shadow:
      0 0 35px rgba(67,100,247,0.7);
    }

    /* TAGS */

    .tags-formatos{

      display:flex;

      gap:15px;

      justify-content:center;
    }

    .tag{

      background:
      rgba(255,255,255,0.03);

      border:
      1px solid rgba(255,255,255,0.2);

      color:
      rgba(255,255,255,0.6);

      padding:10px 25px;

      font-size:16px;

      border-radius:24px;

      font-family:inherit;

      cursor:pointer;

      transition:all 0.2s;
    }

    .tag:hover,
    .tag.aba-ativa{

      background:
      rgba(255,255,255,0.1);

      border-color:#4364F7;

      color:#ffffff;

      box-shadow:
      0 0 12px rgba(67,100,247,0.4);
    }

    /* RODAPÉ */

    .rodape-texto{

      font-size:14px;

      color:
      rgba(255,255,255,0.3);

      margin-top:10px;
    }

  </style>
</head>

<body>

  <main class="container-principal">

    <div class="card-conversor">

      <!-- HEADER COM LOGO -->

      <header class="header-painel">

        <div class="logo-topo">

          <img src="logo.png" alt="Logo File Converter">

          <div class="titulo-logo">

            <button id="link-home" class="link-ativo">
              FILE CONVERTER
            </button>

            <small>
              FAST • MODERN • FUTURISTIC
            </small>

          </div>

        </div>

        <span>|</span>

        <button id="link-sobre">
          SOBRE
        </button>

      </header>

      <!-- RESTO DO SEU PROJETO -->

    </div>

    <p class="rodape-texto">
      © 2026 - Desenvolvido por Ruan Reis
    </p>

  </main>

</body>
</html>
